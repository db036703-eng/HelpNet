<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - HelpNet</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>

<div class="split-layout">
    <!-- Left Panel -->
    <div class="split-left fade-in">
        <div class="brand-content">
            <div class="brand-wrapper">
                <img src="/static/logo.png" alt="HelpNet Logo" class="brand-logo" onerror="this.src='https://via.placeholder.com/64/2563eb/ffffff?text=HN'">
            </div>
            <h1 class="brand-title">HelpNet</h1>
            <p class="brand-subtitle">Connecting donors with NGOs to make a lasting impact in the world.</p>
        </div>
    </div>

    <!-- Right Panel -->
    <div class="split-right">
        <div class="auth-wrapper delay-1 fade-in">
            <div class="glass-card shadow-lg p-5" style="padding: 40px; border-top: 1px solid rgba(255,255,255,0.2);">
                <div class="auth-header" style="text-align: left;">
                    <h2 class="auth-title" style="font-size: 2.2rem; margin-bottom: 5px;">Welcome Back 👋</h2>
                    <p class="auth-subtitle" style="font-size: 1rem; color: rgba(255,255,255,0.7);">Login to your HelpNet account to continue.</p>
                </div>

                <form method="POST" style="margin-top: 30px;">
                    <div class="form-group" style="position: relative;">
                        <label>Email Address</label>
                        <i class="ph ph-envelope-simple" style="position: absolute; left: 15px; top: 42px; color: rgba(255,255,255,0.4); font-size: 1.2rem;"></i>
                        <input type="email" name="email" placeholder="name@example.com" class="input-modern" style="padding-left: 45px;" required>
                    </div>
                    <div class="form-group" style="position: relative;">
                        <label>Password</label>
                        <i class="ph ph-lock-key" style="position: absolute; left: 15px; top: 42px; color: rgba(255,255,255,0.4); font-size: 1.2rem;"></i>
                        <input type="password" name="password" placeholder="••••••••" class="input-modern" style="padding-left: 45px;" required>
                    </div>

                    <button type="submit" class="btn-modern btn-primary mt-4" style="font-size: 1.1rem; padding: 16px;">
                        Sign In <i class="ph ph-arrow-right" style="margin-left: 8px;"></i>
                    </button>
                </form>

                <p class="switch text-center mt-4" style="color: rgba(255,255,255,0.7); font-size: 0.95rem;">
                    Don't have an account?
                    <a href="/register" class="link-modern" style="font-weight: 500; margin-left: 5px; color: var(--light-blue);">Register here</a>
                </p>
            </div>
        </div>
    </div>
</div>

</body>
</html>
